<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>PatilGlobal — Sign In</title>
  <meta name="description"
    content="Sign in to PatilGlobal using your Google account. Secure, fast, no password needed." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Open Graph -->
  <meta property="og:title" content="PatilGlobal — Sign In" />
  <meta property="og:description" content="Sign in to PatilGlobal with Google." />
  <meta property="og:url" content="https://www.patilglobal.in/" />
  <meta property="og:type" content="website" />

  <!--
      Google Identity Services SDK
      ─────────────────────────────
      Loaded with async + defer in <head> so it starts downloading
      immediately alongside the HTML parse, without blocking rendering.
      The GoogleLogin component uses waitForGoogle() to poll until
      window.google.accounts.id is available before calling initialize().
    -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
